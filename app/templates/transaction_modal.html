<!-- Modal for adding transaction -->
<div id="transactionModal" class="modal">
	<div class="modal-content">
		<span class="close" onclick="closeModal()"> &times; </span>
		<h2>Add Transaction</h2>
		<form method="POST" action="/add-transaction">
			<!-- ITEM DROPDOWN -->
			<select
				name="item_id"
				id="itemSelect"
				onchange="updateCurrentQuantity()"
				required>
				<option value="">Select Item</option>

				{% for item in items %}
				<option value="{{ item.id }}" data-quantity="{{ item.quantity }}">
					{{ item.item_name }}
				</option>
				{% endfor %}
			</select>

			<!-- CURRENT QUANTITY -->
			<label>Current Quantity</label>
			<input type="number" id="currentQuantity" readonly />

			<!-- ADJUSTMENT -->
			<label>Adjustment (+/-)</label>
			<input
				type="number"
				id="adjustment"
				name="adjustment"
				value="0"
				oninput="calculateNewQuantity()"
				required />

			<!-- NEW QUANTITY -->
			<label>New Quantity</label>
			<input type="number" id="newQuantity" readonly />

			<!-- NOTE -->
			<label>Note</label>
			<input
				type="text"
				name="note"
				placeholder="Reason for transaction"
				required />
			<button type="submit">Submit</button>
		</form>
	</div>
</div>
